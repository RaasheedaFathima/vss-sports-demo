# Horizontal Pod Autoscaler for the VSS2 Worker
# Automatically scales worker replicas from 1 to 5 based on CPU utilisation.
# Workers are CPU-bound (ffmpeg frame extraction + fastembed inference),
# so CPU is a reliable signal for queue depth.
#
# Requires metrics-server to be installed in the cluster:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vss2-worker-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vss2-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when avg CPU > 70%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # React quickly to new jobs
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
