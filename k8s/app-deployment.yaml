# VSS2 FastAPI App — Deployment + Service + Ingress
# The app is stateless: it writes uploads to a shared NFS PVC and inserts a
# DB row. All heavy analysis is done by the worker pods (see worker-deployment.yaml).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vss2-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vss2-app
  template:
    metadata:
      labels:
        app: vss2-app
    spec:
      containers:
        - name: vss2-app
          # Replace with your image registry path
          image: <YOUR_REGISTRY>/vss2-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vss2-app-config
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vss2-app-secret
                  key: PG_PASSWORD
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vss2-app-secret
                  key: NVIDIA_API_KEY
            - name: LOCAL_COSMOS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vss2-app-secret
                  key: LOCAL_COSMOS_API_KEY
            - name: STATIC_DIR
              value: "/app/static"
          volumeMounts:
            - name: fss
              mountPath: /mnt/fss
            - name: static
              mountPath: /app/static
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: fss
          persistentVolumeClaim:
            claimName: vss-fss-pvc   # Shared NFS PVC (must be pre-provisioned)
        - name: static
          configMap:
            name: vss2-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: vss2-app
  namespace: default
spec:
  selector:
    app: vss2-app
  ports:
    - port: 80
      targetPort: 8000
---
# ConfigMap for the frontend HTML served as a static file.
# Generated by deploy.py — do not edit manually.
# (The actual content is injected during deployment.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: vss2-frontend
  namespace: default
data:
  index.html: |
    <!-- Populated by deploy.py at deployment time -->
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vss2-app-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: vss2.<YOUR_CLUSTER_IP>.nip.io   # Replace with your load-balancer IP
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vss2-app
                port:
                  number: 80
